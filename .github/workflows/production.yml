name: Production Environment (Delivery)

on:
  push:
    branches:
      - main

jobs:
  publish-build:
    name: Test, Tag, and Build Development
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: yarn

      - name: Install dependencies
        run: yarn install --ignore-engines

      - name: Run Unit Tests
        run: yarn test

      - name: Setup Git User
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Bump Version & Tag
        run: npm version patch -m "v%s"

      - name: Push Tag and Commit
        run: git push origin main --follow-tags

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish EAS Development Build
        run: eas build --profile development --platform android --non-interactive
